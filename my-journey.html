<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My H.E.R.O. Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4A; --navy-deep:#0F1830;
    --gold:#B8964A; --gold-bright:#D9B96A; --gold-pale:#F3E9D2;
    --cream:#FBF8F1; --ink:#20283A; --ink-soft:#5B647A;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);font-family:'Inter',-apple-system,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:560px;margin:0 auto;padding-bottom:50px;}

  .header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-deep) 100%);padding:30px 24px 26px;}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;gap:14px;}
  .eyebrow{font-size:11px;font-weight:700;letter-spacing:.28em;color:var(--gold-bright);text-transform:uppercase;margin-bottom:6px;}
  .welcome{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:2px;}
  .name{font-family:'Playfair Display',serif;font-weight:800;font-size:26px;color:#fff;line-height:1.1;}
  .question{font-size:12px;font-style:italic;color:rgba(255,255,255,.6);margin-top:6px;}
  .level-ring{flex-shrink:0;text-align:center;}
  .level-ring .ring-icon{width:56px;height:56px;border-radius:50%;background:var(--gold);color:var(--navy-deep);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 6px;}
  .level-ring .ring-label{font-size:10px;font-weight:800;color:var(--gold-bright);letter-spacing:.04em;}

  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:18px 24px 4px;}
  .stat-card{background:#fff;border:1px solid #E5DCC6;border-top:3px solid var(--gold);border-radius:10px;padding:14px;}
  .stat-card .snum{font-family:'Playfair Display',serif;font-weight:900;font-size:24px;color:var(--navy);}
  .stat-card .slabel{font-size:10px;color:var(--ink-soft);font-weight:700;letter-spacing:.03em;text-transform:uppercase;margin-top:2px;}
  .stat-card .ssub{font-size:10px;color:var(--gold);margin-top:3px;}

  .focus-card{margin:16px 24px 4px;background:var(--navy);border-radius:10px;padding:16px 18px;}
  .focus-card .flabel{font-size:10px;font-weight:700;color:var(--gold-bright);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;}
  .focus-card .ftitle{font-family:'Playfair Display',serif;font-weight:800;font-size:15px;color:#fff;}
  .focus-card .fsub{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px;}

  .recog-list{margin:0 24px;}
  .recog-item{display:flex;gap:10px;align-items:flex-start;background:#fff;border:1px solid #E5DCC6;border-radius:8px;padding:10px 12px;margin-bottom:8px;}
  .recog-item .ricon{font-size:16px;}
  .recog-item .rtitle{font-size:12px;font-weight:700;color:var(--navy);}
  .recog-item .rdesc{font-size:10.5px;color:var(--ink-soft);margin-top:1px;}
  .recog-item .rdate{font-size:9px;color:#a89870;margin-top:2px;}

  .section{padding:22px 24px 4px;}
  .section h2{font-family:'Playfair Display',serif;font-weight:800;font-size:17px;color:var(--navy);margin-bottom:12px;}
  .toggle-row{text-align:center;padding:10px 24px 4px;}
  .toggle-btn{background:none;border:1px solid var(--gold);color:var(--navy);font-size:11px;font-weight:700;padding:8px 18px;border-radius:20px;cursor:pointer;}

  .cards-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:0 24px;margin-bottom:8px;}
  .card{background:#fff;border:2px solid #E5DCC6;border-radius:10px;padding:14px 6px;text-align:center;}
  .card.earned{border-color:var(--gold);background:var(--gold-pale);}
  .card .letter{font-family:'Playfair Display',serif;font-weight:900;font-size:24px;color:#d8cfb6;}
  .card.earned .letter{color:var(--gold);}
  .card .clabel{font-size:9px;font-weight:700;color:#a89870;margin-top:4px;letter-spacing:.03em;}
  .card.earned .clabel{color:var(--navy);}
  .card .cdate{font-size:7.5px;color:var(--ink-soft);margin-top:2px;}

  .timeline{padding:8px 24px 6px;}
  .step{display:flex;gap:14px;margin-bottom:16px;position:relative;}
  .step:not(:last-child)::before{content:"";position:absolute;left:17px;top:38px;width:2px;height:calc(100% - 6px);background:repeating-linear-gradient(to bottom,var(--gold) 0,var(--gold) 4px,transparent 4px,transparent 9px);}
  .step-icon{flex-shrink:0;width:36px;height:36px;border-radius:50%;background:var(--navy);border:2px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:15px;}
  .step-body{padding-top:2px;}
  .step-date{font-size:10px;color:var(--ink-soft);font-weight:600;}
  .step-title{font-family:'Playfair Display',serif;font-weight:800;font-size:14.5px;color:var(--navy);margin:1px 0 2px;}
  .step-desc{font-size:12px;color:var(--ink-soft);line-height:1.5;}
  .ack-btn{margin-top:8px;background:var(--navy);color:var(--gold-bright);border:1px solid var(--gold);font-size:10.5px;font-weight:700;padding:6px 14px;border-radius:16px;cursor:pointer;}
  .ack-btn:disabled{opacity:.5;cursor:default;}

  .empty{text-align:center;padding:40px 24px;color:var(--ink-soft);font-size:13px;}
  .loading{text-align:center;padding:80px 24px;color:var(--ink-soft);font-size:14px;}

  .footer-tag{text-align:center;padding:26px 24px;font-size:10px;letter-spacing:.2em;color:var(--gold);font-weight:700;}
  .error-box{margin:60px 24px;text-align:center;background:#fff;border:1px solid #E5DCC6;border-radius:10px;padding:30px 20px;}
  .error-box h3{font-family:'Playfair Display',serif;color:var(--navy);margin-bottom:8px;}
  .error-box p{font-size:13px;color:var(--ink-soft);}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading">Loading your journey…</div>
</div>

<script>
const AT_ENDPOINT = "/.netlify/functions/airtable";
const LEVEL_ICON = {Candidate:"🎯",Certified:"🥇",Ambassador:"⭐",Elite:"👑","Hall of Legacy":"🏛️"};
const CARD_LABELS = {h:"Honest",e:"Excellence",r:"Respect",o:"Own It"};

async function loadTable(tableKey){
  try{
    const res = await fetch(AT_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"load",tableKey})});
    const j = await res.json();
    return j && j.data ? j.data : [];
  }catch(e){ return []; }
}

async function saveTable(tableKey, data){
  try{
    const res = await fetch(AT_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"save",tableKey,data})});
    const j = await res.json();
    return !!(j && j.ok);
  }catch(e){ return false; }
}

function esc(s){ return (s||"").toString().replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

async function init(){
  const params = new URLSearchParams(window.location.search);
  const token = params.get("t");
  const app = document.getElementById("app");

  if(!token){
    app.innerHTML = `<div class="error-box"><h3>No link provided</h3><p>Ask your supervisor or the Director of People &amp; Culture for your personal Journey link.</p></div>`;
    return;
  }

  const [members, activities, reviews, motm, ciHistoryAll] = await Promise.all([
    loadTable("members"), loadTable("activities"), loadTable("reviews"), loadTable("motm"), loadTable("ci_history")
  ]);

  const m = (members||[]).find(x=>x.journeyToken===token);
  if(!m){
    app.innerHTML = `<div class="error-box"><h3>Link not recognized</h3><p>This link may be out of date. Ask your supervisor or the Director of People &amp; Culture for your current Journey link.</p></div>`;
    return;
  }

  const startDate = m.enrollDate || null;
  const inWindow = d => !startDate || (d && d >= startDate);

  const memberActivitiesAll = (activities||[]).filter(a=>a.participant===m.name);
  const memberReviewsAll = (reviews||[]).filter(r=>r.candidate===m.name);
  const memberCompliments = (m.writeups||[]).filter(w=>w.type==="compliment");
  const memberWriteupsOnly = (m.writeups||[]).filter(w=>w.type==="writeup");
  const memberMotmAll = (motm||[]).filter(e=>e.member===m.name);
  const cardsEarnedCount = Object.keys(CARD_LABELS).filter(k=>!!m[k]).length;
  const totalRecognitions = memberCompliments.length + memberMotmAll.length;
  const approvedReviews = memberReviewsAll.filter(r=>(r.decision||"").toLowerCase().includes("approv"));
  const completedActivities = memberActivitiesAll.filter(a=>a.status==="Completed");
  const inProgress = memberActivitiesAll.filter(a=>a.status && a.status!=="Completed").sort((a,b)=>new Date(a.date)-new Date(b.date))[0];
  const recentRecognitions = [
    ...memberCompliments.map(c=>({date:c.date,icon:"⭐",title:c.category||"Recognition",desc:c.description||""})),
    ...memberMotmAll.map(e=>({date:e.date,icon:"🏆",title:`Member of the Month — ${e.month} ${e.year}`,desc:e.reason||""})),
  ].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,3);

  const cardsHtml = Object.keys(CARD_LABELS).map(k=>{
    const val = m[k];
    const has = !!val;
    const dateStr = typeof val === "string" ? val : "";
    return `<div class="card ${has?'earned':''}"><div class="letter">${k.toUpperCase()}</div><div class="clabel">${CARD_LABELS[k]}</div>${dateStr?`<div class="cdate">${esc(dateStr)}</div>`:""}</div>`;
  }).join("");

  const recogHtml = recentRecognitions.length
    ? recentRecognitions.map(r=>`<div class="recog-item"><div class="ricon">${r.icon}</div><div><div class="rtitle">${esc(r.title)}</div>${r.desc?`<div class="rdesc">${esc(r.desc)}</div>`:""}<div class="rdate">${esc(r.date)}</div></div></div>`).join("")
    : `<div class="empty" style="padding:16px 0;">No recognition logged yet — every win gets recorded here.</div>`;

  // Employee-facing timeline: academy activities, council approvals, recognitions, MOTM wins, value cards, and write-ups.
  // CI analyses are intentionally left out — personality/fit data reads best with a manager present to give it context.
  const timeline = [];
  if(startDate) timeline.push({date:startDate,icon:"🎖️",title:"H.E.R.O. Certified — Program Accepted",desc:"Your journey officially began here."});

  Object.keys(CARD_LABELS).forEach(k=>{
    const val = m[k];
    if(typeof val === "string" && inWindow(val)) timeline.push({date:val,icon:"🏅",title:`H.E.R.O. Value Card — ${CARD_LABELS[k]}`,desc:"Earned"});
  });

  (activities||[]).filter(a=>a.participant===m.name && inWindow(a.date)).forEach(a=>{
    timeline.push({date:a.date,icon:"🎓",title:a.type||"Academy Activity",desc:[a.level,a.status].filter(Boolean).join(" — ")});
  });

  (reviews||[]).filter(r=>r.candidate===m.name && inWindow(r.date) && (r.decision||"").toLowerCase().includes("approv")).forEach(r=>{
    timeline.push({date:r.date,icon:"⚖️",title:r.reviewType||"Council Review",desc:r.decision||""});
  });

  (m.writeups||[]).filter(w=>w.type==="compliment" && inWindow(w.date)).forEach(c=>{
    timeline.push({date:c.date,icon:"⭐",title:c.category||"Recognition",desc:c.description||""});
  });

  (m.milestones||[]).filter(ms=>inWindow(ms.date)).forEach(ms=>{
    timeline.push({date:ms.date,icon:ms.icon||"🎖️",title:ms.label||"Milestone",desc:ms.notes||""});
  });

  memberWriteupsOnly.filter(w=>inWindow(w.date)).forEach(w=>{
    const status = w.acknowledged ? "Acknowledged — on record" : "Pending your acknowledgment";
    timeline.push({date:w.date,icon:"📋",title:w.category||"Coaching Note",desc:[w.description,status].filter(Boolean).join(" — "),writeupId:w.acknowledged?null:w.id});
  });

  (motm||[]).filter(e=>e.member===m.name && inWindow(e.date)).forEach(e=>{
    timeline.push({date:e.date,icon:"🏆",title:`Member of the Month — ${esc(e.month)} ${esc(e.year)}`,desc:e.reason||""});
  });

  timeline.sort((a,b)=>new Date(a.date)-new Date(b.date));

  const timelineHtml = timeline.length
    ? timeline.map((t,i)=>`<div class="step"><div class="step-icon">${t.icon}</div><div class="step-body"><div class="step-date">${esc(t.date)}</div><div class="step-title">${esc(t.title)}</div>${t.desc?`<div class="step-desc">${esc(t.desc)}</div>`:""}${t.writeupId?`<button class="ack-btn" data-wid="${esc(t.writeupId)}">✓ I've seen this</button>`:""}</div></div>`).join("")
    : `<div class="empty">Your journey is just getting started — check back soon as milestones are added.</div>`;

  app.innerHTML = `
    <div class="header">
      <div class="header-top">
        <div>
          <div class="eyebrow">HOODZ of the MidSouth</div>
          <div class="welcome">Welcome back,</div>
          <div class="name">${esc(m.name)}</div>
          <div class="question">"Who am I becoming?"</div>
        </div>
        <div class="level-ring">
          <div class="ring-icon">${LEVEL_ICON[m.level]||"🎯"}</div>
          <div class="ring-label">${esc(m.level||"Candidate")}</div>
        </div>
      </div>
    </div>

    <div class="stat-grid">
      <div class="stat-card"><div class="snum">${cardsEarnedCount}/4</div><div class="slabel">Value Cards Earned</div></div>
      <div class="stat-card"><div class="snum">${totalRecognitions}</div><div class="slabel">Times Recognized</div></div>
      <div class="stat-card"><div class="snum">${completedActivities.length}</div><div class="slabel">Academy Activities</div></div>
      <div class="stat-card"><div class="snum">${approvedReviews.length}</div><div class="slabel">Council Approvals</div></div>
      <div class="stat-card" style="grid-column:span 2;"><div class="snum">${(m.milestones||[]).length}</div><div class="slabel">Milestones & Achievements</div></div>
    </div>

    ${inProgress ? `
    <div class="focus-card">
      <div class="flabel">Current Focus</div>
      <div class="ftitle">${esc(inProgress.type||"Academy Activity")}</div>
      <div class="fsub">${esc(inProgress.level||"")}${inProgress.status?" — "+esc(inProgress.status):""}</div>
    </div>` : ""}

    <div class="section"><h2>Your H.E.R.O. Value Cards</h2></div>
    <div class="cards-row">${cardsHtml}</div>

    <div class="section"><h2>Recent Recognition</h2></div>
    <div class="recog-list">${recogHtml}</div>

    <div class="toggle-row"><button class="toggle-btn" id="toggleTimeline">View Full Journey Timeline ▾</button></div>
    <div class="section" id="timelineSection" style="display:none;"><h2>Your Full Journey</h2></div>
    <div class="timeline" id="timelineBody" style="display:none;">${timelineHtml}</div>

    <div class="footer-tag">PROTECT THE CULTURE · DEVELOP LEADERS · LEAVE A LEGACY</div>
  `;

  document.getElementById("toggleTimeline").addEventListener("click", function(){
    const sec = document.getElementById("timelineSection");
    const body = document.getElementById("timelineBody");
    const showing = body.style.display !== "none";
    sec.style.display = showing ? "none" : "block";
    body.style.display = showing ? "none" : "block";
    this.textContent = showing ? "View Full Journey Timeline ▾" : "Hide Full Timeline ▴";
  });

  document.querySelectorAll(".ack-btn").forEach(btn=>{
    btn.addEventListener("click", async function(){
      const wid = this.getAttribute("data-wid");
      this.disabled = true;
      this.textContent = "Saving…";
      const updatedMembers = (members||[]).map(x=>{
        if(x.journeyToken !== token) return x;
        return {...x, writeups: (x.writeups||[]).map(w=> w.id === wid ? {...w, acknowledged:true} : w)};
      });
      const ok = await saveTable("members", updatedMembers);
      if(ok){
        this.textContent = "✓ Acknowledged";
        const desc = this.parentElement.querySelector(".step-desc");
        if(desc) desc.textContent = desc.textContent.replace("Pending your acknowledgment","Acknowledged — on record");
      } else {
        this.disabled = false;
        this.textContent = "Try Again — I've seen this";
      }
    });
  });
}

init();
</script>
</body>
</html>
